<!DOCTYPE html>
<html><head><title>CSS Test 06 - Text Shadow</title>
<style>
    body { font-family: Helvetica, sans-serif; font-size: 14px; color: #222; margin: 20px; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 8px; }
    .test-section { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; }
    .label { font-weight: bold; margin-bottom: 8px; }
    .shadow1 { font-size: 24px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .shadow2 { font-size: 24px; text-shadow: -1px -1px 0 red; }
    .shadow3 { font-size: 24px; text-shadow: 0 0 10px blue; }
</style></head>
<body>
    <h1>CSS Test 06: Text Shadow</h1>
    <div class="test-section">
        <div class="label">6a: Drop shadow</div><p class="shadow1">Shadow text</p>
        <div class="label">6b: Red outline shadow</div><p class="shadow2">Red shadow</p>
        <div class="label">6c: Blue glow</div><p class="shadow3">Blue glow</p>
    </div>
</body></html>
